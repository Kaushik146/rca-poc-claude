version: '3.8'

services:
  java-order-service:
    build: ./java-order-service
    ports:
      - "8080:8080"
    environment:
      - INVENTORY_SERVICE_URL=http://python-inventory-service:5003
      - NOTIFICATION_SERVICE_URL=http://node-notification-service:5004
    depends_on:
      python-inventory-service:
        condition: service_healthy
      node-notification-service:
        condition: service_healthy
    restart: on-failure
    networks:
      - rca-network

  python-inventory-service:
    build: ./python-inventory-service
    ports:
      - "5003:5003"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5003/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: on-failure
    networks:
      - rca-network

  node-notification-service:
    build: ./node-notification-service
    ports:
      - "5004:5004"
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:5004/health', r => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: on-failure
    networks:
      - rca-network

networks:
  rca-network:
    driver: bridge
